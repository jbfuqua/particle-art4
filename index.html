<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Particle Art — Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; }
        canvas { display: block; }
        #hud {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 13px; letter-spacing: 0.5px;
            text-align: center; pointer-events: none; z-index: 10;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            opacity: 0.7; transition: opacity 0.3s;
        }
        #hud.bright { opacity: 1; }
        #hud .label { font-size: 10px; text-transform: uppercase; opacity: 0.5; margin-bottom: 2px; }
        #hud .scene-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        #hud .palette-name { font-size: 14px; opacity: 0.8; }
        #hud .controls { font-size: 10px; opacity: 0.35; margin-top: 8px; }
        #hud .status { font-size: 11px; margin-top: 6px; color: #f44; font-weight: 600; }
        #hud .status.auto { color: #4f4; }
        #rec-dot {
            display: none; position: fixed; top: 20px; right: 20px;
            width: 14px; height: 14px; border-radius: 50%; background: #f22;
            z-index: 20; box-shadow: 0 0 8px #f22;
            animation: pulse-rec 1s ease-in-out infinite;
        }
        #rec-dot.active { display: block; }
        @keyframes pulse-rec { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        #rec-timer {
            display: none; position: fixed; top: 22px; right: 44px;
            color: #f44; font-size: 13px; font-weight: 600; z-index: 20;
            font-family: 'Helvetica Neue', monospace;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
        }
        #rec-timer.active { display: block; }
        /* Aspect ratio letterboxing */
        body.aspect-1-1 canvas, body.aspect-9-16 canvas {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        /* Mobile toolbar */
        #mobile-bar {
            display: none; position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            z-index: 15; gap: 12px; align-items: center;
            opacity: 0; transition: opacity 0.4s;
        }
        #mobile-bar.visible { opacity: 1; }
        #mobile-bar button {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
            padding: 8px 14px; border-radius: 20px; cursor: pointer;
            text-transform: uppercase; backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            touch-action: manipulation;
        }
        #mobile-bar button:active { background: rgba(255,255,255,0.25); }
        #mobile-bar button.rec-active { background: rgba(255,50,50,0.4); border-color: #f44; }
        /* Touch hint */
        #touch-hint {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3); font-size: 14px; text-align: center;
            pointer-events: none; z-index: 10;
            transition: opacity 0.5s;
        }
        @media (pointer: coarse), (hover: none) {
            #mobile-bar { display: flex; }
            #hud .controls { display: none; }
            #touch-hint { display: block; }
        }
        /* Safe area padding for notched phones */
        @supports (padding: env(safe-area-inset-bottom)) {
            #hud { bottom: calc(24px + env(safe-area-inset-bottom)); }
            #mobile-bar { bottom: calc(70px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <canvas id="canvasWebGL2"></canvas>
    <div id="rec-dot"></div>
    <div id="rec-timer"></div>
    <div id="touch-hint">swipe &larr;&rarr; scene &mdash; swipe &uarr;&darr; palette &mdash; tap for toolbar</div>
    <div id="mobile-bar">
        <button id="btn-rec" onclick="toggleRecord()">Rec</button>
        <button id="btn-aspect" onclick="cycleAspect()">16:9</button>
        <button id="btn-auto" onclick="toggleAutoCycle()">Auto</button>
    </div>
    <div id="hud">
        <div class="scene-name" id="sceneName"></div>
        <div class="palette-name" id="paletteName"></div>
        <div class="status" id="statusLine"></div>
        <div class="controls">S: scene &mdash; P: palette &mdash; R: record &mdash; A: aspect ratio &mdash; C: auto-cycle</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <script>

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
//  SCENE LIBRARY
// ══════════════════════════════════════════════════════════════════
const SCENES = [
    {
        name: "Spiral Galaxy",
        numPoints: 1800,
        trailLength: 40,
        fadeAlpha: 0.08,
        camera: { radius: 2.4, height: 0.9, heightWave: 0.5, speed: 0.12, heightSpeed: 0.06 },
        init() {
            const numArms = 5, armSpread = 0.5, diskRadius = 1.0, diskThickness = 0.2, bulgeSize = 0.3
            const particles = []
            for (let i = 0; i < this.numPoints; i++) {
                const r = Math.pow(Math.random(), 0.5) * diskRadius
                const theta = Math.random() * 2 * Math.PI
                const armIndex = i % numArms
                const armOffset = armIndex * (2 * Math.PI / numArms)
                const spiralTheta = theta + armOffset + armSpread * Math.pow(r, 0.5)
                const x = r * Math.cos(spiralTheta)
                const y = r * Math.sin(spiralTheta)
                const bulgeTransition = Math.pow(Math.min(1, r / bulgeSize), 2)
                const diskProfile = Math.sqrt(1 - Math.pow(r / diskRadius, 2))
                const heightFactor = (1 - bulgeTransition) + diskProfile * bulgeTransition
                const maxHeight = diskThickness * heightFactor
                let z
                if (r < bulgeSize) {
                    const phi = Math.acos(2 * Math.random() - 1)
                    z = r * Math.cos(phi) * (bulgeSize - r) / bulgeSize
                } else {
                    z = (Math.random() - 0.5) * maxHeight
                }
                particles.push({ basePos: [x, y, z], dist: Math.sqrt(x*x + y*y + z*z), seed: Math.random() })
            }
            return particles
        },
        transform(base, dist, t) {
            let x = base[0], y = base[1], z = base[2]
            const pa = t * 0.5, cp = Math.cos(pa), sp = Math.sin(pa)
            let nx = cp * x + sp * z, nz = -sp * x + cp * z; x = nx; z = nz
            const sa = t * 0.8, cs = Math.cos(sa), ss = Math.sin(sa)
            let ny = cs * y - ss * z; nz = ss * y + cs * z; y = ny; z = nz
            const rf = 1.0 - dist, da = t * 0.5 * (rf + 0.1)
            const cd = Math.cos(da), sd = Math.sin(da)
            nx = cd * x + sd * z; nz = -sd * x + cd * z; x = nx; z = nz
            const pulse = Math.sin(t * 2.0) * 0.01 + 1.0
            return [x * pulse, y * pulse, z * pulse]
        }
    },
    {
        name: "Vortex Tunnel",
        numPoints: 2500,
        trailLength: 30,
        fadeAlpha: 0.10,
        camera: { radius: 2.8, height: 0.3, heightWave: 0.8, speed: 0.08, heightSpeed: 0.04 },
        init() {
            const particles = []
            for (let i = 0; i < this.numPoints; i++) {
                const t = Math.random()
                const r = 0.2 + Math.random() * 0.8
                const theta = Math.random() * 2 * Math.PI
                const z = (t - 0.5) * 2.0
                const x = r * Math.cos(theta)
                const y = r * Math.sin(theta)
                particles.push({ basePos: [x, y, z], dist: r, seed: Math.random() })
            }
            return particles
        },
        transform(base, dist, t) {
            let x = base[0], y = base[1], z = base[2]
            // Spiral rotation — faster near center
            const speed = (1.8 - dist * 1.0) * t * 1.2
            const cs = Math.cos(speed), sn = Math.sin(speed)
            const nx = cs * x - sn * y, ny = sn * x + cs * y
            x = nx; y = ny
            // Z oscillation
            z = base[2] + Math.sin(t * 0.4 + dist * 4.0) * 0.3
            // Funnel — radius shrinks toward z extremes
            const squeeze = 1.0 - Math.abs(z) * 0.15
            return [x * squeeze, y * squeeze, z]
        }
    },
    {
        name: "Jellyfish Bloom",
        numPoints: 2000,
        trailLength: 70,
        fadeAlpha: 0.04,
        camera: { radius: 3.0, height: 0.5, heightWave: 1.0, speed: 0.06, heightSpeed: 0.03 },
        init() {
            const particles = []
            for (let i = 0; i < this.numPoints; i++) {
                // Bell shape — hemisphere top, tentacles below
                const isTentacle = Math.random() < 0.4
                let x, y, z
                if (isTentacle) {
                    const theta = Math.random() * 2 * Math.PI
                    const r = 0.15 + Math.random() * 0.7
                    x = r * Math.cos(theta)
                    y = r * Math.sin(theta)
                    z = -(Math.random() * 1.2)
                } else {
                    const phi = Math.random() * Math.PI * 0.5
                    const theta = Math.random() * 2 * Math.PI
                    const r = 0.9 + Math.random() * 0.3
                    x = r * Math.sin(phi) * Math.cos(theta)
                    y = r * Math.sin(phi) * Math.sin(theta)
                    z = r * Math.cos(phi) * 0.4
                }
                particles.push({ basePos: [x, y, z], dist: Math.sqrt(x*x + y*y), seed: Math.random(), isTentacle })
            }
            return particles
        },
        transform(base, dist, t, particle) {
            let x = base[0], y = base[1], z = base[2]
            // Gentle drift upward
            const drift = Math.sin(t * 0.3) * 0.3
            z += drift
            // Pulsing bell
            if (!particle.isTentacle) {
                const pulse = Math.sin(t * 1.5) * 0.1 + 1.0
                x *= pulse; y *= pulse
                z *= 0.9 + Math.sin(t * 1.5 + Math.PI) * 0.1
            } else {
                // Tentacles sway
                const sway = Math.sin(t * 0.8 + base[2] * 3.0 + particle.seed * 6.0) * 0.15
                x += sway
                y += Math.cos(t * 0.6 + base[2] * 2.0 + particle.seed * 4.0) * 0.12
                // Tentacles follow bell pulse with delay
                z += Math.sin(t * 1.5 - 0.5) * 0.05
            }
            // Slow rotation
            const a = t * 0.15
            const cs = Math.cos(a), sn = Math.sin(a)
            const nx = cs * x - sn * y, ny = sn * x + cs * y
            return [nx, ny, z]
        }
    },
    {
        name: "DNA Helix",
        numPoints: 2000,
        trailLength: 45,
        fadeAlpha: 0.07,
        camera: { radius: 3.0, height: 0.0, heightWave: 1.5, speed: 0.10, heightSpeed: 0.05 },
        init() {
            const particles = []
            for (let i = 0; i < this.numPoints; i++) {
                const strand = i % 2
                // Spread particles evenly along helix; they'll travel continuously
                const param = i / this.numPoints
                const travelSpeed = 0.04 + Math.random() * 0.03
                const jitter = (Math.random() - 0.5) * 0.35
                particles.push({
                    basePos: [0, 0, 0], dist: param, seed: Math.random(),
                    strand, param, travelSpeed, jitter, r: 0.7,
                })
            }
            return particles
        },
        transform(base, dist, t, p) {
            // Particle travels continuously along helix — no wrapping, just scrolls
            // Use sine to oscillate back and forth along the helix length
            const travel = Math.sin(p.param * Math.PI * 2 + t * p.travelSpeed * 3.0) * 0.5 + 0.5
            const helixTurns = 3
            const helixLen = 3.0
            const z = (travel - 0.5) * helixLen
            const helixAngle = travel * helixTurns * 2 * Math.PI + p.strand * Math.PI
            let x = (p.r + p.jitter) * Math.cos(helixAngle)
            let y = (p.r + p.jitter) * Math.sin(helixAngle)
            // Rotation around Z axis
            const a = t * 0.3
            const cs = Math.cos(a), sn = Math.sin(a)
            const nx = cs * x - sn * y, ny = sn * x + cs * y
            x = nx; y = ny
            // Breathing wave
            const breathe = Math.sin(t * 0.8 + z * 2.0) * 0.08 + 1.0
            x *= breathe; y *= breathe
            // Gentle lateral wave
            x += Math.sin(t * 0.5 + z * 1.5) * 0.08
            return [x, y, z]
        }
    },
    {
        name: "Flow Field",
        numPoints: 2000,
        trailLength: 30,
        fadeAlpha: 0.08,
        camera: { radius: 3.5, height: 0.8, heightWave: 0.7, speed: 0.05, heightSpeed: 0.03 },
        init() {
            const particles = []
            for (let i = 0; i < this.numPoints; i++) {
                const x = (Math.random() - 0.5) * 2.4
                const y = (Math.random() - 0.5) * 2.4
                const z = (Math.random() - 0.5) * 2.4
                particles.push({
                    basePos: [x, y, z], dist: Math.sqrt(x*x+y*y+z*z), seed: Math.random(),
                    // Respawn timer — particles that drift too far get recycled
                    life: Math.random() * 500,
                })
            }
            return particles
        },
        transform(base, dist, t, p) {
            let x = base[0], y = base[1], z = base[2]

            // 3D curl noise velocity field — three octaves for rich turbulence
            // Uses sine-based pseudo-noise (no library needed)
            const s = 1.8 // spatial frequency
            const drift = t * 0.15 // field evolves over time

            // Octave 1 — large-scale flow
            const vx1 = Math.sin(y*s + drift) * Math.cos(z*s*0.7 + drift*0.6) * 0.012
            const vy1 = Math.sin(z*s*0.8 + drift*0.8) * Math.cos(x*s + drift*0.5) * 0.012
            const vz1 = Math.sin(x*s*0.9 + drift*0.7) * Math.cos(y*s*0.8 + drift*0.9) * 0.012

            // Octave 2 — medium turbulence
            const s2 = s * 2.3
            const d2 = drift * 1.4
            const vx2 = Math.sin(y*s2 + z*s2*0.5 + d2) * 0.006
            const vy2 = Math.sin(z*s2 + x*s2*0.5 + d2*0.8) * 0.006
            const vz2 = Math.sin(x*s2 + y*s2*0.5 + d2*1.1) * 0.006

            // Octave 3 — fine detail
            const s3 = s * 5.0
            const d3 = drift * 2.0
            const vx3 = Math.sin(y*s3 + d3) * Math.cos(z*s3*1.3 + d3*0.7) * 0.003
            const vy3 = Math.cos(z*s3 + d3*1.2) * Math.sin(x*s3*0.9 + d3) * 0.003
            const vz3 = Math.sin(x*s3*1.1 + d3*0.9) * Math.cos(y*s3 + d3*1.3) * 0.003

            // Combined velocity
            x += vx1 + vx2 + vx3
            y += vy1 + vy2 + vy3
            z += vz1 + vz2 + vz3

            // Gentle inward pull to keep particles from drifting away
            const r = Math.sqrt(x*x + y*y + z*z)
            if (r > 1.2) {
                const pull = (r - 1.2) * 0.005
                x -= x/r * pull; y -= y/r * pull; z -= z/r * pull
            }

            // Respawn particles that escape or have been alive too long
            p.life++
            p.respawned = false
            if (r > 2.0 || p.life > 600 + p.seed * 400) {
                x = (Math.random() - 0.5) * 1.6
                y = (Math.random() - 0.5) * 1.6
                z = (Math.random() - 0.5) * 1.6
                p.life = 0
                p.respawned = true
            }

            base[0] = x; base[1] = y; base[2] = z
            return [x, y, z]
        }
    },
    {
        name: "Torus Knot",
        numPoints: 2500,
        trailLength: 55,
        fadeAlpha: 0.05,
        camera: { radius: 3.2, height: 1.0, heightWave: 0.6, speed: 0.09, heightSpeed: 0.04 },
        init() {
            const particles = []
            const kp = 3, kq = 2 // trefoil knot
            for (let i = 0; i < this.numPoints; i++) {
                const u = (i / this.numPoints) * 2 * Math.PI
                const r = Math.cos(kq * u) + 2
                // Point on the knot centerline
                const cx = r * Math.cos(kp * u) * 0.35
                const cy = r * Math.sin(kp * u) * 0.35
                const cz = -Math.sin(kq * u) * 0.35
                // Random offset angle around the tube cross-section
                const tubeAngle = Math.random() * Math.PI * 2
                const tubeR = Math.random() * 0.12
                particles.push({
                    basePos: [cx, cy, cz],
                    dist: Math.sqrt(cx*cx + cy*cy + cz*cz) / 1.2,
                    seed: Math.random(),
                    tubeAngle, tubeR, u,
                })
            }
            return particles
        },
        transform(base, dist, t, p) {
            let x = base[0], y = base[1], z = base[2]

            // Breathing — tube width pulses with a wave traveling along the knot
            const breathe = 1.0 + Math.sin(t * 0.8 + p.u * 2.0) * 0.5 + Math.sin(t * 1.3 - p.u * 3.0) * 0.3
            const tubeR = p.tubeR * breathe

            // Approximate normal/binormal from base position direction
            const len = Math.sqrt(x*x + y*y + z*z)
            const nx = x / len, ny = y / len, nz = z / len
            // Use a simple perpendicular — cross with up then cross again
            let bx = -ny, by = nx, bz = 0
            const bLen = Math.sqrt(bx*bx + by*by) || 1
            bx /= bLen; by /= bLen
            const ux = ny * bz - nz * by, uy = nz * bx - nx * bz, uz = nx * by - ny * bx

            // Offset in tube cross-section
            const ca = Math.cos(p.tubeAngle), sa = Math.sin(p.tubeAngle)
            x += (bx * ca + ux * sa) * tubeR
            y += (by * ca + uy * sa) * tubeR
            z += (bz * ca + uz * sa) * tubeR

            // Tumble rotation
            const a1 = t * 0.25, c1 = Math.cos(a1), s1 = Math.sin(a1)
            let rx = c1 * x + s1 * z, rz = -s1 * x + c1 * z; x = rx; z = rz
            const a2 = t * 0.18, c2 = Math.cos(a2), s2 = Math.sin(a2)
            let ry = c2 * y - s2 * z; rz = s2 * y + c2 * z; y = ry; z = rz

            return [x, y, z]
        }
    },
    {
        name: "Cascading Fountain",
        numPoints: 2800,
        trailLength: 55,
        fadeAlpha: 0.045,
        camera: { radius: 3.2, height: 0.6, heightWave: 0.7, speed: 0.06, heightSpeed: 0.035 },
        init() {
            const particles = []
            const numStreams = 6
            for (let i = 0; i < this.numPoints; i++) {
                const stream = i % numStreams
                const streamAngle = (stream / numStreams) * 2 * Math.PI
                // Three tiers: central plume, mid arcs, outer cascade
                const tier = i < this.numPoints * 0.3 ? 0 : i < this.numPoints * 0.65 ? 1 : 2
                const phase = Math.random() * Math.PI * 2
                const speed = 0.6 + Math.random() * 0.5
                // Vary arc height and spread by tier
                const arcHeight = tier === 0 ? 1.4 + Math.random() * 0.4
                              : tier === 1 ? 0.8 + Math.random() * 0.3
                              : 0.4 + Math.random() * 0.2
                const spread = tier === 0 ? 0.15 + Math.random() * 0.15
                            : tier === 1 ? 0.4 + Math.random() * 0.3
                            : 0.7 + Math.random() * 0.4
                const spiralRate = tier === 0 ? 0.8 : tier === 1 ? 1.5 : 2.5
                particles.push({
                    basePos: [0, 0, 0],
                    dist: spread,
                    seed: Math.random(),
                    stream, streamAngle, tier, phase, speed,
                    arcHeight, spread, spiralRate,
                    lifetime: 3.0 + Math.random() * 2.0,
                    jitterX: (Math.random() - 0.5) * 0.08,
                    jitterY: (Math.random() - 0.5) * 0.08,
                })
            }
            return particles
        },
        transform(base, dist, t, p) {
            // Cycle each particle through its arc
            const cycle = ((t * 0.25 * p.speed + p.phase) % p.lifetime) / p.lifetime
            // Smooth ease — fast launch, hang at peak, gentle fall
            const rise = Math.sin(cycle * Math.PI)
            const z = rise * p.arcHeight - (1.0 - rise) * cycle * 0.4
            // Spiral outward as particle rises, tighter as it falls
            const outward = Math.sin(cycle * Math.PI) * p.spread
            const angle = p.streamAngle + cycle * p.spiralRate + Math.sin(t * 0.2) * 0.3
            const x = outward * Math.cos(angle) + p.jitterX * rise
            const y = outward * Math.sin(angle) + p.jitterY * rise
            // Whole fountain rotates slowly
            const rot = t * 0.1
            const cr = Math.cos(rot), sr = Math.sin(rot)
            return [cr * x - sr * y, sr * x + cr * y, z - 0.5]
        }
    },
    {
        name: "Solar Flares",
        numPoints: 3000,
        trailLength: 55,
        fadeAlpha: 0.05,
        camera: { radius: 3.2, height: 0.8, heightWave: 0.6, speed: 0.05, heightSpeed: 0.03 },
        // Flare state — managed outside particles so all particles in a region respond together
        _flares: [],
        _lastFlareTime: 0,
        init() {
            this._flares = []
            this._lastFlareTime = 0
            const particles = []
            const R = 0.7 // solar radius
            for (let i = 0; i < this.numPoints; i++) {
                // Distribute on sphere surface with slight depth variation
                const phi = Math.acos(2 * Math.random() - 1)
                const theta = Math.random() * 2 * Math.PI
                const r = R + (Math.random() - 0.5) * 0.06
                const x = r * Math.sin(phi) * Math.cos(theta)
                const y = r * Math.sin(phi) * Math.sin(theta)
                const z = r * Math.cos(phi)
                // Each particle has its own orbit axis (tangent to sphere)
                const orbitSpeed = 0.15 + Math.random() * 0.2
                const orbitPhase = Math.random() * Math.PI * 2
                // Latitude band — affects differential rotation
                const lat = Math.abs(Math.asin(z / r))
                particles.push({
                    basePos: [x, y, z], dist: r, seed: Math.random(),
                    phi, theta, r, orbitSpeed, orbitPhase, lat,
                })
            }
            return particles
        },
        transform(base, dist, t, p) {
            const R = 0.7
            // Differential rotation — equator faster, poles slower (like real sun)
            const diffRot = p.orbitSpeed * (1.0 - 0.3 * Math.sin(p.lat))
            const theta = p.theta + t * diffRot
            const phi = p.phi

            // Base position on sphere
            let x = p.r * Math.sin(phi) * Math.cos(theta)
            let y = p.r * Math.sin(phi) * Math.sin(theta)
            let z = p.r * Math.cos(phi)

            // Surface convection — small random wobble simulating granulation
            const conv = 0.02
            x += Math.sin(t * 0.8 + p.seed * 20.0) * conv
            y += Math.sin(t * 0.7 + p.seed * 15.0 + 1.0) * conv
            z += Math.sin(t * 0.9 + p.seed * 25.0 + 2.0) * conv

            // Spawn new flares — faster rate, occasional bursts
            const spawnInterval = 0.4 + Math.sin(t * 0.15) * 0.2
            if (t - this._lastFlareTime > spawnInterval) {
                this._lastFlareTime = t
                // Occasionally spawn 2-3 flares at once (coronal mass ejection)
                const burstCount = Math.random() < 0.25 ? 2 + Math.floor(Math.random() * 2) : 1
                for (let b = 0; b < burstCount; b++) {
                    const fPhi = Math.acos(2 * Math.random() - 1)
                    const fTheta = Math.random() * 2 * Math.PI
                    const fx = Math.sin(fPhi) * Math.cos(fTheta)
                    const fy = Math.sin(fPhi) * Math.sin(fTheta)
                    const fz = Math.cos(fPhi)
                    // Wider variety — from small spicules to massive eruptions
                    const isMassive = Math.random() < 0.15
                    this._flares.push({
                        origin: [fx, fy, fz],
                        birthTime: t,
                        duration: isMassive ? 3.5 + Math.random() * 3.0 : 1.0 + Math.random() * 2.0,
                        strength: isMassive ? 1.0 + Math.random() * 1.2 : 0.3 + Math.random() * 0.7,
                        arcHeight: isMassive ? 1.2 + Math.random() * 1.5 : 0.3 + Math.random() * 0.8,
                        spread: isMassive ? 0.35 + Math.random() * 0.25 : 0.2 + Math.random() * 0.25,
                        twistSpeed: 1.5 + Math.random() * 2.5,
                        twistStrength: 0.2 + Math.random() * 0.5,
                    })
                }
                // Limit active flares
                while (this._flares.length > 10) this._flares.shift()
            }
            // Prune dead flares
            this._flares = this._flares.filter(f => t - f.birthTime <= f.duration)

            // Apply flare forces
            for (const flare of this._flares) {
                const age = t - flare.birthTime
                if (age < 0 || age > flare.duration) continue

                const len = Math.sqrt(x*x + y*y + z*z)
                const nx = x / len, ny = y / len, nz = z / len

                const dot = nx * flare.origin[0] + ny * flare.origin[1] + nz * flare.origin[2]
                const proximity = Math.max(0, dot)
                const inFlare = Math.pow(proximity, 6.0 / (flare.spread * flare.spread))

                if (inFlare < 0.01) continue

                // Flare lifecycle: fast rise, slow fall
                const life = age / flare.duration
                const envelope = Math.pow(Math.sin(life * Math.PI), 0.6) * (1.0 - life * 0.2)

                const pushDist = flare.strength * flare.arcHeight * envelope * inFlare

                // Magnetic loop twist — cross product gives tangent direction
                const cx = flare.origin[1] * nz - flare.origin[2] * ny
                const cy = flare.origin[2] * nx - flare.origin[0] * nz
                const cz = flare.origin[0] * ny - flare.origin[1] * nx
                const twist = Math.sin(life * Math.PI * flare.twistSpeed) * flare.twistStrength * inFlare * envelope

                // Add secondary wobble for turbulent look
                const turb = Math.sin(life * 12.0 + p.seed * 30.0) * 0.06 * envelope * inFlare

                x += nx * pushDist + cx * twist + cx * turb
                y += ny * pushDist + cy * twist + cy * turb
                z += nz * pushDist + cz * twist + cz * turb
            }

            // Slow whole-star tumble
            const tumble = t * 0.04
            const ct = Math.cos(tumble), st = Math.sin(tumble)
            const rx = ct * x + st * z
            const rz = -st * x + ct * z

            return [rx, y, rz]
        }
    },
]

// ══════════════════════════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════════════════════════
let canvasW = 0, canvasH = 0
let aspectVersion = 0 // bumped on aspect change to trigger resize

const BLOOM_DOWNSAMPLE = 4
const BLOOM_PASSES = 2

let currentScene = 0
let currentPalette = 0
let particles = []
let history = []
let needsReset = true

// ── Scene transition state ──
const TRANSITION_FRAMES = 120 // ~2 sec at 60fps
let transitionProgress = -1 // -1 = no transition active
let transitionFrom = null // { sceneIndex, particles, time }
let transitionTo = null

function resetScene() {
    const scene = SCENES[currentScene]
    particles = scene.init()
    history = particles.map(() => [])
    needsReset = false
    updateHUD()
}

function cycleScene(dir = 1) {
    const prevIndex = currentScene
    currentScene = (currentScene + dir + SCENES.length) % SCENES.length
    // Start fluid transition instead of hard reset
    const newScene = SCENES[currentScene]
    const newParticles = newScene.init()
    transitionFrom = { sceneIndex: prevIndex, particles: particles, time: 0 }
    transitionTo = { sceneIndex: currentScene, particles: newParticles, time: 0 }
    // Ensure both particle arrays are same length by padding the shorter one
    const maxLen = Math.max(transitionFrom.particles.length, transitionTo.particles.length)
    while (transitionFrom.particles.length < maxLen) {
        const src = transitionFrom.particles[transitionFrom.particles.length % particles.length]
        transitionFrom.particles.push({ ...src, basePos: [...src.basePos] })
    }
    while (transitionTo.particles.length < maxLen) {
        const src = transitionTo.particles[transitionTo.particles.length % newParticles.length]
        transitionTo.particles.push({ ...src, basePos: [...src.basePos] })
    }
    // Expand history to match
    while (history.length < maxLen) history.push([])
    transitionProgress = 0
    updateHUD()
    flashHUD()
}

function cyclePalette(dir = 1) {
    currentPalette = (currentPalette + dir + PALETTES.length) % PALETTES.length
    updateHUD()
    flashHUD()
}

function updateHUD() {
    document.getElementById('sceneName').textContent = SCENES[currentScene].name
    document.getElementById('paletteName').textContent = PALETTES[currentPalette].name
}

function flashHUD() {
    const hud = document.getElementById('hud')
    hud.classList.add('bright')
    clearTimeout(hud._timer)
    hud._timer = setTimeout(() => hud.classList.remove('bright'), 1500)
}

// ══════════════════════════════════════════════════════════════════
//  RECORDING & ASPECT RATIO & AUTO-CYCLE
// ══════════════════════════════════════════════════════════════════
let mediaRecorder = null
let recordedChunks = []
let isRecording = false
let recStartTime = 0

const ASPECT_MODES = [
    { name: '16:9', ratio: 16/9 },
    { name: '1:1', ratio: 1 },
    { name: '9:16', ratio: 9/16 },
]
const isMobileDevice = matchMedia('(pointer: coarse), (hover: none)').matches
let currentAspect = isMobileDevice ? 1 : 0 // mobile starts at 1:1, desktop at 16:9

let autoCycleActive = false
let autoCycleTimer = 0
const AUTO_CYCLE_INTERVAL = 300 // frames between transitions (~5 sec at 60fps)
let autoCycleMode = 0 // 0=cycle scene, 1=cycle palette, alternates

function getCanvasSize() {
    const mode = ASPECT_MODES[currentAspect]
    const screenW = window.innerWidth
    const screenH = window.innerHeight
    const screenRatio = screenW / screenH
    if (Math.abs(screenRatio - mode.ratio) < 0.01) return [screenW, screenH]
    if (mode.ratio > screenRatio) {
        return [screenW, Math.floor(screenW / mode.ratio)]
    } else {
        return [Math.floor(screenH * mode.ratio), screenH]
    }
}

function applyAspect() {
    aspectVersion++
    updateStatus()
}

function cycleAspect() {
    currentAspect = (currentAspect + 1) % ASPECT_MODES.length
    applyAspect()
    flashHUD()
}

function toggleRecord() {
    if (isRecording) {
        stopRecording()
    } else {
        startRecording()
    }
}

function startRecording() {
    const canvas = document.getElementById('canvasWebGL2')
    // captureStream(0) = capture a frame every time the canvas paints
    const stream = canvas.captureStream(0)
    recordedChunks = []

    const mimeTypes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
    let mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm'

    mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12000000 })
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data) }
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mimeType })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = `particle-art-${SCENES[currentScene].name.toLowerCase().replace(/\s+/g,'-')}-${Date.now()}.webm`
        a.click()
        URL.revokeObjectURL(url)
    }
    // Collect data every 1s — less overhead, fewer chunk boundaries
    mediaRecorder.start(1000)
    isRecording = true
    recStartTime = performance.now()
    document.getElementById('rec-dot').classList.add('active')
    document.getElementById('rec-timer').classList.add('active')

    // Also manually request a frame on every draw so captureStream(0) has data
    canvas._recStream = stream
    updateStatus()
    flashHUD()
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop()
    }
    isRecording = false
    const canvas = document.getElementById('canvasWebGL2')
    if (canvas._recStream) {
        canvas._recStream.getTracks().forEach(t => t.stop())
        canvas._recStream = null
    }
    document.getElementById('rec-dot').classList.remove('active')
    document.getElementById('rec-timer').classList.remove('active')
    updateStatus()
    flashHUD()
}

function toggleAutoCycle() {
    autoCycleActive = !autoCycleActive
    autoCycleTimer = 0
    autoCycleMode = 0
    updateStatus()
    flashHUD()
}

function updateRecTimer() {
    if (!isRecording) return
    const elapsed = Math.floor((performance.now() - recStartTime) / 1000)
    const min = Math.floor(elapsed / 60)
    const sec = elapsed % 60
    document.getElementById('rec-timer').textContent = `${min}:${sec.toString().padStart(2, '0')}`
}

function updateStatus() {
    const el = document.getElementById('statusLine')
    const parts = []
    if (isRecording) parts.push('REC')
    if (autoCycleActive) parts.push('AUTO-CYCLE')
    const aspect = ASPECT_MODES[currentAspect].name
    if (currentAspect > 0) parts.push(aspect)
    el.textContent = parts.join(' | ')
    el.className = 'status' + (autoCycleActive ? ' auto' : '')
    updateMobileButtons()
}

// Keyboard controls
document.addEventListener('keydown', e => {
    if (e.key === 's' || e.key === 'S') cycleScene(e.shiftKey ? -1 : 1)
    else if (e.key === 'p' || e.key === 'P') cyclePalette(e.shiftKey ? -1 : 1)
    else if (e.key === 'ArrowRight') cycleScene(1)
    else if (e.key === 'ArrowLeft') cycleScene(-1)
    else if (e.key === 'ArrowUp') cyclePalette(1)
    else if (e.key === 'ArrowDown') cyclePalette(-1)
    else if (e.key === 'r' || e.key === 'R') toggleRecord()
    else if (e.key === 'a' || e.key === 'A') cycleAspect()
    else if (e.key === 'c' || e.key === 'C') toggleAutoCycle()
})

// Mouse controls (desktop only — disabled on touch devices)
let isTouchDevice = false
document.addEventListener('click', e => {
    if (isTouchDevice) return
    cyclePalette(1)
})
document.addEventListener('contextmenu', e => { e.preventDefault(); if (!isTouchDevice) cycleScene(1) })

// ══════════════════════════════════════════════════════════════════
//  TOUCH / MOBILE CONTROLS
// ══════════════════════════════════════════════════════════════════
let touchStartX = 0, touchStartY = 0, touchStartTime = 0
let mobileBarTimer = null
const SWIPE_THRESHOLD = 40
const TAP_THRESHOLD = 15
const TAP_TIME = 300

function showMobileBar() {
    const bar = document.getElementById('mobile-bar')
    bar.classList.add('visible')
    clearTimeout(mobileBarTimer)
    mobileBarTimer = setTimeout(() => bar.classList.remove('visible'), 4000)
}

function updateMobileButtons() {
    const btnRec = document.getElementById('btn-rec')
    const btnAspect = document.getElementById('btn-aspect')
    const btnAuto = document.getElementById('btn-auto')
    if (btnRec) {
        btnRec.textContent = isRecording ? 'Stop' : 'Rec'
        btnRec.classList.toggle('rec-active', isRecording)
    }
    if (btnAspect) btnAspect.textContent = ASPECT_MODES[currentAspect].name
    if (btnAuto) btnAuto.textContent = autoCycleActive ? 'Auto: On' : 'Auto'
}

document.addEventListener('touchstart', e => {
    isTouchDevice = true
    const touch = e.touches[0]
    touchStartX = touch.clientX
    touchStartY = touch.clientY
    touchStartTime = performance.now()

    // Hide touch hint after first interaction
    const hint = document.getElementById('touch-hint')
    if (hint) hint.style.opacity = '0'
}, { passive: true })

document.addEventListener('touchend', e => {
    const touch = e.changedTouches[0]
    const dx = touch.clientX - touchStartX
    const dy = touch.clientY - touchStartY
    const dt = performance.now() - touchStartTime
    const absDx = Math.abs(dx)
    const absDy = Math.abs(dy)

    // Ignore if touch was on a button
    if (e.target.closest('#mobile-bar')) return

    // Tap — show/hide toolbar
    if (absDx < TAP_THRESHOLD && absDy < TAP_THRESHOLD && dt < TAP_TIME) {
        showMobileBar()
        updateMobileButtons()
        flashHUD()
        return
    }

    // Swipe detection
    if (absDx > SWIPE_THRESHOLD || absDy > SWIPE_THRESHOLD) {
        if (absDx > absDy) {
            // Horizontal swipe — cycle scene
            cycleScene(dx > 0 ? -1 : 1)
        } else {
            // Vertical swipe — cycle palette
            cyclePalette(dy > 0 ? -1 : 1)
        }
    }
}, { passive: true })

// Prevent default touch behaviors (pull-to-refresh, zoom, scroll)
document.addEventListener('touchmove', e => {
    if (!e.target.closest('#mobile-bar')) e.preventDefault()
}, { passive: false })

// ── Palette interpolation ──
function paletteColor(t, palette) {
    const colors = palette.colors
    t = ((t % 1.0) + 1.0) % 1.0
    const idx = t * (colors.length - 1)
    const i = Math.floor(idx)
    const f = idx - i
    const sf = f * f * (3 - 2 * f)
    const a = colors[i], b = colors[Math.min(i + 1, colors.length - 1)]
    return [
        a[0] + (b[0] - a[0]) * sf,
        a[1] + (b[1] - a[1]) * sf,
        a[2] + (b[2] - a[2]) * sf,
    ]
}

// ══════════════════════════════════════════════════════════════════
//  SHADERS
// ══════════════════════════════════════════════════════════════════
const trailVert = `#version 300 es
precision highp float;
layout(location = 0) in vec3 aPosition;
layout(location = 1) in vec4 aColor;
uniform mat4 uMVP;
out vec4 vColor;
void main() {
    gl_Position = uMVP * vec4(aPosition, 1.0);
    vColor = aColor;
}
`

const trailFrag = `#version 300 es
precision highp float;
in vec4 vColor;
out vec4 fragColor;
void main() {
    fragColor = vColor;
}
`

const quadVert = `#version 300 es
layout(location = 0) in vec2 aPosition;
out vec2 vUV;
void main() {
    vUV = aPosition * 0.5 + 0.5;
    gl_Position = vec4(aPosition, 0.0, 1.0);
}
`

const fadeFrag = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform float uAlpha;
void main() {
    fragColor = vec4(0.0, 0.0, 0.0, uAlpha);
}
`

const blurFrag = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform sampler2D uTexture;
uniform vec2 uDirection;
void main() {
    float weights[7] = float[](0.0205, 0.0855, 0.232, 0.324, 0.232, 0.0855, 0.0205);
    vec3 result = vec3(0.0);
    for (int i = -3; i <= 3; i++) {
        vec2 offset = uDirection * float(i) * 2.0;
        result += texture(uTexture, vUV + offset).rgb * weights[i + 3];
    }
    fragColor = vec4(result, 1.0);
}
`

const compositeFrag = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform sampler2D uScene;
uniform sampler2D uBloom;
uniform float uBloomIntensity;
uniform float uSaturation;
void main() {
    vec3 scene = texture(uScene, vUV).rgb;
    vec3 bloom = texture(uBloom, vUV).rgb;
    vec3 result = scene + bloom * uBloomIntensity;
    float luma = dot(result, vec3(0.299, 0.587, 0.114));
    result = mix(vec3(luma), result, uSaturation);
    fragColor = vec4(clamp(result, 0.0, 1.0), 1.0);
}
`


// ══════════════════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════════════════
function createProgram(gl, vertSrc, fragSrc) {
    const prog = gl.createProgram()
    const vs = gl.createShader(gl.VERTEX_SHADER)
    gl.shaderSource(vs, vertSrc); gl.compileShader(vs)
    if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) console.error('Vert:', gl.getShaderInfoLog(vs))
    gl.attachShader(prog, vs)
    const fs = gl.createShader(gl.FRAGMENT_SHADER)
    gl.shaderSource(fs, fragSrc); gl.compileShader(fs)
    if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) console.error('Frag:', gl.getShaderInfoLog(fs))
    gl.attachShader(prog, fs)
    gl.linkProgram(prog)
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog))
    return prog
}

function createFBO(gl, w, h) {
    const fbo = gl.createFramebuffer()
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo)
    const texture = gl.createTexture()
    gl.bindTexture(gl.TEXTURE_2D, texture)
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0)
    gl.bindFramebuffer(gl.FRAMEBUFFER, null)
    return { fbo, texture }
}

function resizeFBO(gl, fboObj, w, h) {
    gl.bindTexture(gl.TEXTURE_2D, fboObj.texture)
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null)
}

// ══════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ══════════════════════════════════════════════════════════════════
const main = () => {
    const canvas = document.getElementById("canvasWebGL2")
    const [initW, initH] = getCanvasSize()
    canvas.width = initW; canvas.height = initH
    canvasW = initW; canvasH = initH
    const gl = canvas.getContext("webgl2", { preserveDrawingBuffer: true })
    gl.getExtension('EXT_color_buffer_float')
    gl.viewport(0, 0, canvasW, canvasH)

    const trailProgram = createProgram(gl, trailVert, trailFrag)
    const fadeProgram = createProgram(gl, quadVert, fadeFrag)
    const blurProgram = createProgram(gl, quadVert, blurFrag)
    const compositeProgram = createProgram(gl, quadVert, compositeFrag)
    const sceneFBO = createFBO(gl, canvasW, canvasH)
    let blurW = Math.floor(canvasW / BLOOM_DOWNSAMPLE)
    let blurH = Math.floor(canvasH / BLOOM_DOWNSAMPLE)
    const blurFBO_A = createFBO(gl, blurW, blurH)
    const blurFBO_B = createFBO(gl, blurW, blurH)

    gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO.fbo)
    gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT)
    gl.bindFramebuffer(gl.FRAMEBUFFER, null)

    let lastAspectVersion = aspectVersion

    // Fullscreen quad
    const quadVAO = gl.createVertexArray()
    gl.bindVertexArray(quadVAO)
    const quadBuf = gl.createBuffer()
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf)
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW)
    gl.enableVertexAttribArray(0)
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0)
    gl.bindVertexArray(null)

    // Trail buffer — sized for max possible
    const maxTrailLen = Math.max(...SCENES.map(s => s.trailLength))
    const maxPts = Math.max(...SCENES.map(s => s.numPoints))
    const maxVerts = maxPts * (maxTrailLen - 1) * 2
    const trailData = new Float32Array(maxVerts * 7)

    const trailVAO = gl.createVertexArray()
    gl.bindVertexArray(trailVAO)
    const trailBuffer = gl.createBuffer()
    gl.bindBuffer(gl.ARRAY_BUFFER, trailBuffer)
    gl.bufferData(gl.ARRAY_BUFFER, trailData.byteLength, gl.DYNAMIC_DRAW)
    gl.enableVertexAttribArray(0)
    gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 28, 0)
    gl.enableVertexAttribArray(1)
    gl.vertexAttribPointer(1, 4, gl.FLOAT, false, 28, 12)
    gl.bindVertexArray(null)

    const projectionMatrix = mat4.create()
    mat4.perspective(projectionMatrix, Math.PI / 4, canvasW / canvasH, 0.1, 100)
    const viewMatrix = mat4.create()
    const mvpMatrix = mat4.create()

    const trailMVPLoc = gl.getUniformLocation(trailProgram, "uMVP")
    const fadeAlphaLoc = gl.getUniformLocation(fadeProgram, "uAlpha")
    const blurTexLoc = gl.getUniformLocation(blurProgram, "uTexture")
    const blurDirLoc = gl.getUniformLocation(blurProgram, "uDirection")
    const compSceneLoc = gl.getUniformLocation(compositeProgram, "uScene")
    const compBloomLoc = gl.getUniformLocation(compositeProgram, "uBloom")
    const compIntensityLoc = gl.getUniformLocation(compositeProgram, "uBloomIntensity")
    const compSatLoc = gl.getUniformLocation(compositeProgram, "uSaturation")

    let time = 0

    resetScene()

    const draw = () => {
        // Handle aspect ratio / resolution changes
        if (aspectVersion !== lastAspectVersion) {
            lastAspectVersion = aspectVersion
            const [newW, newH] = getCanvasSize()
            canvas.width = newW; canvas.height = newH
            canvasW = newW; canvasH = newH
            canvas.style.position = 'fixed'
            canvas.style.top = '50%'
            canvas.style.left = '50%'
            canvas.style.transform = 'translate(-50%, -50%)'
            // Resize FBOs
            resizeFBO(gl, sceneFBO, canvasW, canvasH)
            blurW = Math.floor(canvasW / BLOOM_DOWNSAMPLE)
            blurH = Math.floor(canvasH / BLOOM_DOWNSAMPLE)
            resizeFBO(gl, blurFBO_A, blurW, blurH)
            resizeFBO(gl, blurFBO_B, blurW, blurH)
            // Update projection
            mat4.perspective(projectionMatrix, Math.PI / 4, canvasW / canvasH, 0.1, 100)
            // Clear scene FBO
            gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO.fbo)
            gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT)
            gl.bindFramebuffer(gl.FRAMEBUFFER, null)
        }

        if (needsReset) {
            resetScene()
            gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO.fbo)
            gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT)
            gl.bindFramebuffer(gl.FRAMEBUFFER, null)
            time = 0
        }

        const scene = SCENES[currentScene]
        const palette = PALETTES[currentPalette]

        // Handle transition blending
        const inTransition = transitionProgress >= 0 && transitionProgress <= 1
        let tEase = 0
        if (inTransition) {
            transitionProgress += 1 / TRANSITION_FRAMES
            // Smooth ease-in-out
            tEase = transitionProgress < 0.5
                ? 2 * transitionProgress * transitionProgress
                : 1 - Math.pow(-2 * transitionProgress + 2, 2) / 2
            if (transitionProgress >= 1) {
                // Transition complete — commit to new scene
                particles = transitionTo.particles
                history = history.slice(0, particles.length)
                transitionProgress = -1
                transitionFrom = null
                transitionTo = null
            }
        }

        // Camera — blend between old and new during transition
        let cam
        if (inTransition && transitionFrom) {
            const camA = SCENES[transitionFrom.sceneIndex].camera
            const camB = SCENES[transitionTo.sceneIndex].camera
            cam = {
                radius: camA.radius + (camB.radius - camA.radius) * tEase,
                height: camA.height + (camB.height - camA.height) * tEase,
                heightWave: camA.heightWave + (camB.heightWave - camA.heightWave) * tEase,
                speed: camA.speed + (camB.speed - camA.speed) * tEase,
                heightSpeed: camA.heightSpeed + (camB.heightSpeed - camA.heightSpeed) * tEase,
            }
        } else {
            cam = scene.camera
        }

        // Camera orbit
        const camAngle = time * cam.speed
        mat4.lookAt(viewMatrix,
            [Math.cos(camAngle) * cam.radius, Math.sin(camAngle) * cam.radius,
             cam.height + Math.sin(time * cam.heightSpeed) * cam.heightWave],
            [0, 0, 0], [0, 0, 1])
        mat4.multiply(mvpMatrix, projectionMatrix, viewMatrix)

        // Update particles
        let vertCount = 0, dataOffset = 0

        const activeCount = inTransition && transitionTo
            ? Math.max(transitionFrom.particles.length, transitionTo.particles.length)
            : particles.length

        for (let i = 0; i < activeCount; i++) {
            let pos
            let p
            if (inTransition && transitionFrom && transitionTo) {
                const fromScene = SCENES[transitionFrom.sceneIndex]
                const toScene = SCENES[transitionTo.sceneIndex]
                const pFrom = transitionFrom.particles[i]
                const pTo = transitionTo.particles[i]
                p = pTo
                const posA = fromScene.transform(pFrom.basePos, pFrom.dist, time, pFrom)
                transitionTo.time += 0 // keep time in sync
                const posB = toScene.transform(pTo.basePos, pTo.dist, time, pTo)
                pos = [
                    posA[0] + (posB[0] - posA[0]) * tEase,
                    posA[1] + (posB[1] - posA[1]) * tEase,
                    posA[2] + (posB[2] - posA[2]) * tEase,
                ]
            } else {
                p = particles[i]
                pos = scene.transform(p.basePos, p.dist, time, p)
            }

            if (!history[i]) history[i] = []
            const hist = history[i]
            // Clear history on respawn to prevent long streaks
            if (p.respawned) hist.length = 0
            hist.push(pos)
            const maxTrail = inTransition
                ? Math.max(SCENES[transitionFrom.sceneIndex].trailLength, SCENES[transitionTo.sceneIndex].trailLength)
                : scene.trailLength
            if (hist.length > maxTrail) hist.shift()

            // Color field
            const px = pos[0], py = pos[1], pz = pos[2]
            const wave1 = Math.sin(px * 4.0 + time * 0.3) * 0.5 + 0.5
            const wave2 = Math.sin(py * 5.0 - time * 0.2 + px * 3.0) * 0.5 + 0.5
            const wave3 = Math.sin((px + py) * 3.0 + pz * 8.0 + time * 0.15) * 0.5 + 0.5
            const wave4 = Math.sin(Math.atan2(py, px) * 3.0 + Math.sqrt(px*px+py*py) * 6.0 - time * 0.4) * 0.5 + 0.5
            const hue = (wave1 * 0.3 + wave2 * 0.25 + wave3 * 0.2 + wave4 * 0.25 + p.seed * 0.05) % 1.0
            const [cr, cg, cb] = paletteColor(hue, palette)
            const ta = palette.trailAlpha

            for (let j = 0; j < hist.length - 1; j++) {
                const t0 = j / (hist.length - 1)
                const t1 = (j + 1) / (hist.length - 1)
                const a0 = t0 * t0 * ta
                const a1 = t1 * t1 * ta
                const b0 = 0.3 + t0 * 0.7
                const b1 = 0.3 + t1 * 0.7

                trailData[dataOffset++] = hist[j][0]
                trailData[dataOffset++] = hist[j][1]
                trailData[dataOffset++] = hist[j][2]
                trailData[dataOffset++] = cr * b0
                trailData[dataOffset++] = cg * b0
                trailData[dataOffset++] = cb * b0
                trailData[dataOffset++] = a0

                trailData[dataOffset++] = hist[j+1][0]
                trailData[dataOffset++] = hist[j+1][1]
                trailData[dataOffset++] = hist[j+1][2]
                trailData[dataOffset++] = cr * b1
                trailData[dataOffset++] = cg * b1
                trailData[dataOffset++] = cb * b1
                trailData[dataOffset++] = a1

                vertCount += 2
            }
        }

        gl.bindBuffer(gl.ARRAY_BUFFER, trailBuffer)
        gl.bufferSubData(gl.ARRAY_BUFFER, 0, trailData.subarray(0, dataOffset))

        // Pass 1: Fade + draw
        gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO.fbo)
        gl.viewport(0, 0, canvasW, canvasH)
        gl.enable(gl.BLEND)
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA)
        gl.useProgram(fadeProgram)
        const fadeAlpha = inTransition && transitionFrom
            ? SCENES[transitionFrom.sceneIndex].fadeAlpha + (SCENES[transitionTo.sceneIndex].fadeAlpha - SCENES[transitionFrom.sceneIndex].fadeAlpha) * tEase
            : scene.fadeAlpha
        gl.uniform1f(fadeAlphaLoc, fadeAlpha)
        gl.bindVertexArray(quadVAO)
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)

        gl.blendFunc(gl.SRC_ALPHA, gl.ONE)
        gl.useProgram(trailProgram)
        gl.uniformMatrix4fv(trailMVPLoc, false, mvpMatrix)
        gl.bindVertexArray(trailVAO)
        gl.drawArrays(gl.LINES, 0, vertCount)
        gl.bindVertexArray(null)

        // Pass 2: Bloom
        gl.disable(gl.BLEND)
        gl.useProgram(blurProgram)
        gl.bindVertexArray(quadVAO)

        for (let p = 0; p < BLOOM_PASSES; p++) {
            gl.bindFramebuffer(gl.FRAMEBUFFER, blurFBO_B.fbo)
            gl.viewport(0, 0, blurW, blurH)
            gl.activeTexture(gl.TEXTURE0)
            gl.bindTexture(gl.TEXTURE_2D, p === 0 ? sceneFBO.texture : blurFBO_A.texture)
            gl.uniform1i(blurTexLoc, 0)
            gl.uniform2f(blurDirLoc, 1.0 / blurW, 0.0)
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)

            gl.bindFramebuffer(gl.FRAMEBUFFER, blurFBO_A.fbo)
            gl.bindTexture(gl.TEXTURE_2D, blurFBO_B.texture)
            gl.uniform2f(blurDirLoc, 0.0, 1.0 / blurH)
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)
        }

        // Pass 3: Composite to screen
        gl.bindFramebuffer(gl.FRAMEBUFFER, null)
        gl.viewport(0, 0, canvasW, canvasH)
        gl.useProgram(compositeProgram)
        gl.activeTexture(gl.TEXTURE0)
        gl.bindTexture(gl.TEXTURE_2D, sceneFBO.texture)
        gl.uniform1i(compSceneLoc, 0)
        gl.activeTexture(gl.TEXTURE1)
        gl.bindTexture(gl.TEXTURE_2D, blurFBO_A.texture)
        gl.uniform1i(compBloomLoc, 1)
        gl.uniform1f(compIntensityLoc, palette.bloomIntensity)
        gl.uniform1f(compSatLoc, palette.saturationBoost)
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)
        gl.bindVertexArray(null)

        // Auto-cycle
        if (autoCycleActive) {
            autoCycleTimer++
            if (autoCycleTimer >= AUTO_CYCLE_INTERVAL) {
                autoCycleTimer = 0
                if (autoCycleMode === 0) {
                    cycleScene(1)
                } else {
                    cyclePalette(1)
                }
                autoCycleMode = (autoCycleMode + 1) % 3 // scene, palette, palette, repeat
            }
        }

        // Recording — capture frame and update timer
        if (isRecording && canvas._recStream) {
            const track = canvas._recStream.getVideoTracks()[0]
            if (track && track.requestFrame) track.requestFrame()
        }
        updateRecTimer()

        time += 0.005
        requestAnimationFrame(draw)
    }
    draw()
}

main()
    </script>
</body>
</html>
